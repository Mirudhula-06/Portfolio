<div class="min-h-screen bg-[#020617] text-white px-6 py-16">

  <div class="max-w-7xl mx-auto">

    <a routerLink="/" class="text-purple-400 hover:text-purple-300">
      ← Back to Portfolio
    </a>

    <h1 class="text-5xl font-bold mt-10 mb-6">
      My Certificates
    </h1>

    <p class="text-gray-300 mb-12">
      Here are my certifications and achievements related to programming, full stack development, AI and technical learning.
    </p>

    <div class="grid md:grid-cols-3 gap-8">

      <div *ngFor="let certificate of certificates"
        class="bg-white/10 backdrop-blur-md border border-white/10 rounded-2xl overflow-hidden hover:-translate-y-3 hover:shadow-purple-500/20 hover:shadow-2xl transition-all duration-500">

        <img [src]="certificate.image" class="w-full h-56 object-cover">

        <div class="p-6">
          <h2 class="text-2xl font-bold mb-2">
            {{ certificate.title }}
          </h2>

          <p class="text-purple-300 mb-3">
            {{ certificate.platform }}
          </p>

          <p class="text-gray-300 text-sm mb-5">
            {{ certificate.description }}
          </p>

          <a [href]="certificate.link"
            target="_blank"
            class="inline-block bg-gradient-to-r from-purple-600 to-pink-500 px-5 py-2 rounded-lg font-semibold hover:scale-105 transition">
            View Certificate
          </a>
        </div>

      </div>

    </div>

  </div>

</div>
